<section class="game-shell">
  <header class="hud">
    <div class="stat-card">
      <span class="label">Boss</span>
      <div class="bar">
        <div class="fill boss" [style.width]="bossHealth() + '%'"></div>
      </div>
      <strong>{{ bossHealth() }} HP</strong>
    </div>

    <div class="stat-card">
      <span class="label">Player</span>
      <div class="bar">
        <div class="fill player" [style.width]="playerHealth() + '%'"></div>
      </div>
      <strong>{{ playerHealth() }} HP</strong>
    </div>
  </header>

  <main class="arena">
    <section class="boss-panel">
      <div class="boss-avatar">👹</div>
      <p class="boss-title">Boss Angular</p>
      <h2>{{ currentQuestion().prompt }}</h2>
    </section>

    @if (!gameOver()) {
      <section class="attack-panel">
        @for (option of currentQuestion().options; track option; let i = $index) {
          <button type="button" class="attack-btn" (click)="attack(i)">
            <span class="attack-tag">Attack {{ i + 1 }}</span>
            <span class="attack-text">{{ option }}</span>
          </button>
        }
      </section>
    }

    @if (gameOver()) {
      <section class="result-panel">
        <p class="result-text">{{ feedback() }}</p>
        <button type="button" class="restart-btn" (click)="restart()">Play again</button>
      </section>
    } @else {
      <p class="feedback">{{ feedback() }}</p>
    }
  </main>
</section>
